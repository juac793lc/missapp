<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MISSAPP</title>
    <meta name="theme-color" content="#f2ca50" />
    <link rel="apple-touch-icon" href="icon.png" />
    <style>
      #splash-screen {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #000000;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      .logo-container {
        position: relative;
        width: 150px;
        height: 150px;
        margin-bottom: 24px;
      }
      .logo-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 50%;
        border: 3px solid #f2ca50;
        box-shadow: 0 0 30px rgba(242, 202, 80, 0.4);
      }
      .loading-text {
        color: #f2ca50;
        font-family: 'Times New Roman', serif;
        font-size: 1.2rem;
        letter-spacing: 0.5em;
        font-weight: 900;
        text-transform: uppercase;
        animation: pulse 2s infinite ease-in-out;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.3; transform: scale(0.98); }
        50% { opacity: 1; transform: scale(1); }
      }
    </style>
    <script type="module" crossorigin src="/missapp/assets/index-Tp2g06Ty.js"></script>
    <link rel="stylesheet" crossorigin href="/missapp/assets/index-BKEz1gxg.css">
  <link rel="manifest" href="/missapp/manifest.webmanifest"></head>
  <body style="background: #000000; margin: 0;">
    <div id="splash-screen">
      <div class="logo-container">
        <img src="icon.png" class="logo-img" alt="MISSAPP Logo">
      </div>
      <div class="loading-text">Cargando</div>
    </div>
    <div id="root"></div>
  </body>
</html>
